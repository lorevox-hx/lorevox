<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lorevox — Interview (v2 + TTS + People)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { color-scheme: dark; }
    body { background: #0b0b0c; }
    .bubble { max-width: 72ch; white-space: pre-wrap; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  </style>
</head>
<body class="text-zinc-100 p-4 md:p-6">

<div class="max-w-6xl mx-auto">
  <div class="flex items-center justify-between gap-3 mb-4">
    <div>
      <div class="text-2xl font-semibold">Lorevox Interview</div>
      <div class="text-sm text-zinc-400">v2: summaries + auto follow-ups + final memoir + TTS</div>
    </div>
    <div class="text-xs text-zinc-500 mono">/ui/lorevox_interview_ui_v2.html</div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
    <div class="bg-zinc-900/60 border border-zinc-800 rounded-2xl p-4">
      <div class="text-sm font-semibold mb-2">Interview Setup</div>

      <label class="block text-xs text-zinc-400 mb-1">Person</label>
      <select id="personSelect" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-3 py-2 text-sm mb-2"></select>

      <div class="grid grid-cols-2 gap-2 mt-2">
        <button id="refreshPeopleBtn" class="bg-zinc-800 hover:bg-zinc-700 rounded-xl px-3 py-2 text-sm">Refresh</button>
        <button id="newPersonBtn" class="bg-zinc-700 hover:bg-zinc-600 rounded-xl px-3 py-2 text-sm">New Person</button>
      </div>

      <button id="startBtn" class="w-full mt-2 bg-emerald-700 hover:bg-emerald-600 rounded-xl px-3 py-2 text-sm font-bold">Start Interview</button>

      <div class="mt-4 border-t border-zinc-800 pt-3">
        <div class="text-xs text-zinc-400 mb-1">Voice Settings</div>
        <label class="flex items-center gap-2 text-sm cursor-pointer">
          <input type="checkbox" id="chkAutoSpeak" checked class="accent-emerald-500">
          Enable Auto-TTS (Lori / p335)
        </label>
        <button id="btnStopAudio" class="mt-2 w-full bg-red-900/50 hover:bg-red-800/50 border border-red-800 rounded-xl px-3 py-2 text-sm text-red-200">🛑 Stop Audio</button>
      </div>

      <div class="mt-4 border-t border-zinc-800 pt-3">
        <div class="text-xs text-zinc-400 mb-1">Status</div>
        <div id="status" class="text-sm text-zinc-200">Ready.</div>
      </div>
    </div>

    <div class="lg:col-span-2 bg-zinc-900/60 border border-zinc-800 rounded-2xl p-4 flex flex-col min-h-[70vh]">
      <div class="flex items-center justify-between gap-3">
        <div>
          <div class="text-sm font-semibold">Conversation</div>
          <div id="activeQ" class="text-xs text-zinc-400">—</div>
        </div>
        <button id="clearBtn" class="bg-zinc-800 hover:bg-zinc-700 rounded-xl px-3 py-2 text-sm">Clear UI</button>
      </div>

      <div id="chat" class="mt-3 flex-1 overflow-auto space-y-3 pr-1 pb-4"></div>

      <div class="mt-3 border-t border-zinc-800 pt-3">
        <div class="flex gap-2">
          <textarea id="answer" rows="2" class="flex-1 bg-zinc-950 border border-zinc-800 rounded-xl px-3 py-2 text-sm" placeholder="Type your answer..."></textarea>
          <div class="flex flex-col gap-2">
            <button id="sendBtn" class="bg-blue-700 hover:bg-blue-600 rounded-xl px-3 py-2 text-sm">Send</button>
            <button id="skipBtn" class="bg-zinc-800 hover:bg-zinc-700 rounded-xl px-3 py-2 text-sm">Skip</button>
          </div>
        </div>
        <div class="text-xs text-zinc-500 mt-2">Tip: Ctrl/Cmd + Enter sends.</div>
      </div>
    </div>
  </div>

  <div class="mt-4 bg-zinc-900/60 border border-zinc-800 rounded-2xl p-4">
    <div class="flex items-center justify-between gap-3">
      <div>
        <div class="text-sm font-semibold">Draft Output</div>
        <div class="text-xs text-zinc-400">Section summaries and final memoir draft appear here.</div>
      </div>
    </div>
    <textarea id="output" rows="10" class="mt-3 w-full bg-zinc-950 border border-zinc-800 rounded-xl px-3 py-2 text-sm"></textarea>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);

  // Network setup
  const ORIGIN = window.location.origin;
  const HOSTNAME = window.location.hostname;
  const PROTOCOL = window.location.protocol;
  const TTS_BASE = `${PROTOCOL}//${HOSTNAME}:8001`;

  let sessionId = null;
  let planId = "default";
  let activeQuestion = null;

  function setStatus(msg, isSpeaking = false){ 
    $("status").textContent = msg; 
    if(isSpeaking) $("status").classList.add("text-emerald-400", "pulse");
    else $("status").classList.remove("text-emerald-400", "pulse");
  }

  function bubble(role, text){
    const wrap = document.createElement('div');
    wrap.className = role === 'assistant' ? 'flex' : 'flex justify-end';
    const b = document.createElement('div');
    b.className = 'bubble rounded-2xl px-4 py-3 text-sm border ' +
      (role === 'assistant' ? 'bg-zinc-950 border-zinc-800 text-zinc-100' : 'bg-blue-900/40 border-blue-800 text-zinc-100');
    b.textContent = text;
    wrap.appendChild(b);
    $("chat").appendChild(wrap);
    $("chat").scrollTop = $("chat").scrollHeight;
  }

  function appendOutput(title, text){
    const out = $("output");
    out.value += `${title}\n${'-'.repeat(60)}\n${text}\n\n`;
    out.scrollTop = out.scrollHeight;
  }

  // --- TTS Queue Player ---
  class AudioQueuePlayer {
    constructor(){ this.queue=[]; this.playing=false; this.currentAudio=null; }
    enqueue(blob){ this.queue.push(blob); if (!this.playing) this.playNext(); }
    stopAll(){
      this.queue=[]; this.playing=false;
      if (this.currentAudio){ try{ this.currentAudio.pause(); }catch(e){} }
      this.currentAudio=null;
      setStatus("Audio stopped");
    }
    async playNext(){
      if (this.queue.length === 0){ this.playing=false; this.currentAudio=null; setStatus("System Ready."); return; }
      this.playing=true;
      setStatus("Speaking...", true);
      const blob = this.queue.shift();
      const audio = new Audio(URL.createObjectURL(blob));
      this.currentAudio = audio;
      audio.onended = () => this.playNext();
      audio.play().catch(() => this.playNext());
    }
  }
  const audioPlayer = new AudioQueuePlayer();

  async function triggerVoiceStream(text){
    if (!$("chkAutoSpeak").checked) return;
    const clean = (text || "").replace(/\[\[.*?\]\]/g, "").replace(/[ ]{2,}/g, " ").trim();
    if (!clean) return;

    try {
      const response = await fetch(`${TTS_BASE}/api/tts/speak_stream`, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        // Updated voice to p335
        body: JSON.stringify({ text: clean, voice: "p335" }) 
      });
      if (!response.ok) throw new Error(`TTS HTTP ${response.status}`);
      
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true){
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream:true });
        const lines = buffer.split("\n");
        buffer = lines.pop(); // Keep incomplete line in buffer
        for (const line of lines){
          if (!line.trim()) continue;
          try {
            const j = JSON.parse(line);
            if (j.wav_b64){
              const binary = atob(j.wav_b64);
              const bytes = new Uint8Array(binary.length);
              for (let i=0; i<binary.length; i++) bytes[i] = binary.charCodeAt(i);
              audioPlayer.enqueue(new Blob([bytes], { type:"audio/wav" }));
            }
          } catch(e){}
        }
      }
    } catch(e) {
      console.error("TTS Error:", e);
      setStatus("TTS error or offline");
    }
  }

  // --- People Management ---
  async function refreshPeople(){
    setStatus('Loading people...');
    const res = await fetch('/api/people?limit=200&offset=0');
    const j = await res.json();
    const sel = $("personSelect");
    sel.innerHTML = '';
    for(const p of (j.items || [])){
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = `${p.display_name} (${p.id.slice(0,8)})`;
      sel.appendChild(opt);
    }
    setStatus('Ready.');
  }

  async function createPerson(){
    const name = prompt("Enter new person's display name:");
    if (!name) return;
    const res = await fetch('/api/people', {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ display_name: name, role: "subject" })
    });
    if(res.ok) await refreshPeople();
    else alert("Failed to create person.");
  }

  // --- Interview Flow ---
  async function startInterview(){
    const personId = $("personSelect").value;
    if(!personId){ alert('Select a person'); return; }

    setStatus('Starting...');
    audioPlayer.stopAll();
    
    const res = await fetch('/api/interview/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ person_id: personId, plan_id: planId })
    });
    if(!res.ok){ alert(await res.text()); return; }
    
    const j = await res.json();
    sessionId = j.session_id;
    $("sessionInfo").textContent = `Session: ${sessionId.slice(0,8)}...`;
    $("chat").innerHTML = '';

    if(j.question){
      activeQuestion = j.question;
      $("activeQ").textContent = `Current Section: ${j.question.section_id}`;
      bubble('assistant', j.question.prompt);
      triggerVoiceStream(j.question.prompt);
    }
  }

  async function submitAnswer(skipped=false){
    if(!sessionId || !activeQuestion) return;

    const text = (skipped ? '' : $("answer").value).trim();
    if(!skipped && !text) return;

    audioPlayer.stopAll();
    if(!skipped) bubble('user', text);
    $("answer").value = '';
    setStatus('Processing...');

    const res = await fetch('/api/interview/answer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, question_id: activeQuestion.id, answer: text, skipped: skipped })
    });
    
    if(!res.ok){ alert("Error saving answer."); return; }
    const j = await res.json();

    // Handle Summaries
    if(j.generated_summary){
      const label = j.summary_section_title ? `📝 Section Summary — ${j.summary_section_title}` : '📝 Section Summary';
      bubble('assistant', `${label}\n\n${j.generated_summary}`);
      appendOutput(label, j.generated_summary);
      
      // Let Lori read the summary first, then she will read the next question
      await triggerVoiceStream(`Here is a summary of what we just discussed. ${j.generated_summary}`);
    }

    if(j.followups_inserted > 0){
      const msg = `✨ Added ${j.followups_inserted} follow-up questions.`;
      bubble('assistant', msg);
      await triggerVoiceStream("I have a few follow-up questions based on what you've shared.");
    }

    if(j.final_memoir){
      bubble('assistant', `📖 Final Memoir Draft\n\n${j.final_memoir}`);
      appendOutput('📖 Final Memoir Draft', j.final_memoir);
      await triggerVoiceStream("We have reached the end of the interview. I am compiling your final memoir draft now.");
    }

    // Handle Next Question
    if(j.done){
      activeQuestion = null;
      $("activeQ").textContent = "Interview Complete";
    } else {
      activeQuestion = j.next_question;
      $("activeQ").textContent = `Current Section: ${j.next_question.section_id}`;
      bubble('assistant', j.next_question.prompt);
      triggerVoiceStream(j.next_question.prompt);
    }
  }

  // --- Listeners ---
  $("refreshPeopleBtn").onclick = refreshPeople;
  $("newPersonBtn").onclick = createPerson;
  $("startBtn").onclick = startInterview;
  $("sendBtn").onclick = () => submitAnswer(false);
  $("skipBtn").onclick = () => { bubble('user', '⏭️ (skipped)'); submitAnswer(true); };
  $("btnStopAudio").onclick = () => audioPlayer.stopAll();
  $("clearBtn").onclick = () => { $("chat").innerHTML = ''; $("output").value = ''; };
  $("answer").onkeydown = (e) => { if(e.key === 'Enter' && (e.ctrlKey || e.metaKey)){ e.preventDefault(); submitAnswer(false); } };

  refreshPeople();
</script>
</body>
</html>
