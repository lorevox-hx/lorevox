<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lorevox — Interview (v2)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { color-scheme: dark; }
    body { background: #0b0b0c; }
    .bubble { max-width: 72ch; white-space: pre-wrap; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
  </style>
</head>
<body class="text-zinc-100">

<div class="max-w-6xl mx-auto p-4 md:p-6">
  <div class="flex items-center justify-between gap-3 mb-4">
    <div>
      <div class="text-2xl font-semibold">Lorevox Interview</div>
      <div class="text-sm text-zinc-400">v2: section summaries + auto follow-ups + final memoir</div>
    </div>
    <div class="text-xs text-zinc-500 mono">/ui/lorevox_interview_ui_v2.html</div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">

    <!-- Left: controls -->
    <div class="bg-zinc-900/60 border border-zinc-800 rounded-2xl p-4">
      <div class="text-sm font-semibold mb-2">Interview Setup</div>

      <label class="block text-xs text-zinc-400 mb-1">Person</label>
      <select id="personSelect" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-3 py-2 text-sm"></select>

      <div class="grid grid-cols-2 gap-2 mt-3">
        <button id="refreshPeopleBtn" class="bg-zinc-800 hover:bg-zinc-700 rounded-xl px-3 py-2 text-sm">Refresh</button>
        <button id="startBtn" class="bg-emerald-700 hover:bg-emerald-600 rounded-xl px-3 py-2 text-sm">Start</button>
      </div>

      <div class="mt-4 border-t border-zinc-800 pt-3">
        <div class="text-xs text-zinc-400 mb-1">Session</div>
        <div id="sessionInfo" class="text-xs mono text-zinc-300">—</div>
      </div>

      <div class="mt-4 border-t border-zinc-800 pt-3">
        <div class="text-xs text-zinc-400 mb-1">Status</div>
        <div id="status" class="text-sm text-zinc-200">Ready.</div>
      </div>
    </div>

    <!-- Center: chat -->
    <div class="lg:col-span-2 bg-zinc-900/60 border border-zinc-800 rounded-2xl p-4 flex flex-col min-h-[70vh]">
      <div class="flex items-center justify-between gap-3">
        <div>
          <div class="text-sm font-semibold">Conversation</div>
          <div id="activeQ" class="text-xs text-zinc-400">—</div>
        </div>
        <div class="flex gap-2">
          <button id="clearBtn" class="bg-zinc-800 hover:bg-zinc-700 rounded-xl px-3 py-2 text-sm">Clear</button>
        </div>
      </div>

      <div id="chat" class="mt-3 flex-1 overflow-auto space-y-3 pr-1"></div>

      <div class="mt-3 border-t border-zinc-800 pt-3">
        <div class="flex gap-2">
          <textarea id="answer" rows="2" class="flex-1 bg-zinc-950 border border-zinc-800 rounded-xl px-3 py-2 text-sm" placeholder="Type your answer..."></textarea>
          <div class="flex flex-col gap-2">
            <button id="sendBtn" class="bg-blue-700 hover:bg-blue-600 rounded-xl px-3 py-2 text-sm">Send</button>
            <button id="skipBtn" class="bg-zinc-800 hover:bg-zinc-700 rounded-xl px-3 py-2 text-sm">Skip</button>
          </div>
        </div>
        <div class="text-xs text-zinc-500 mt-2">Tip: Ctrl/Cmd + Enter sends.</div>
      </div>
    </div>

  </div>

  <!-- Output -->
  <div class="mt-4 bg-zinc-900/60 border border-zinc-800 rounded-2xl p-4">
    <div class="flex items-center justify-between gap-3">
      <div>
        <div class="text-sm font-semibold">Draft Output</div>
        <div class="text-xs text-zinc-400">Section summaries and final memoir draft appear here.</div>
      </div>
      <button id="copyBtn" class="bg-zinc-800 hover:bg-zinc-700 rounded-xl px-3 py-2 text-sm">Copy</button>
    </div>
    <textarea id="output" rows="10" class="mt-3 w-full bg-zinc-950 border border-zinc-800 rounded-xl px-3 py-2 text-sm"></textarea>
  </div>

</div>

<script>
  const $ = (id) => document.getElementById(id);

  let sessionId = null;
  let planId = "default";
  let activeQuestion = null; // {id, prompt, section_id, ord}

  function setStatus(msg){ $("status").textContent = msg; }

  function bubble(role, text){
    const wrap = document.createElement('div');
    wrap.className = role === 'assistant' ? 'flex' : 'flex justify-end';

    const b = document.createElement('div');
    b.className = 'bubble rounded-2xl px-4 py-3 text-sm border ' +
      (role === 'assistant'
        ? 'bg-zinc-950 border-zinc-800 text-zinc-100'
        : 'bg-blue-900/40 border-blue-800 text-zinc-100');

    b.textContent = text;
    wrap.appendChild(b);
    $("chat").appendChild(wrap);
    $("chat").scrollTop = $("chat").scrollHeight;
  }

  function setActiveQuestion(q){
    activeQuestion = q;
    if(!q){ $("activeQ").textContent = "—"; return; }
    $("activeQ").textContent = `Q (${q.section_id} • ord ${q.ord}): ${q.prompt}`;
  }

  function appendOutput(title, text){
    const out = $("output");
    const block = `${title}\n${'-'.repeat(Math.min(60, title.length))}\n${text}\n\n`;
    out.value = (out.value || "") + block;
    out.scrollTop = out.scrollHeight;
  }

  async function refreshPeople(){
    setStatus('Loading people...');
    const res = await fetch('/api/people?limit=200&offset=0');
    const j = await res.json();
    const sel = $("personSelect");
    sel.innerHTML = '';
    for(const p of (j.items || [])){
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = `${p.display_name} (${p.id.slice(0,8)})`;
      sel.appendChild(opt);
    }
    setStatus('Ready.');
  }

  async function startInterview(){
    const personId = $("personSelect").value;
    if(!personId){ alert('Select a person'); return; }

    setStatus('Starting interview...');
    const res = await fetch('/api/interview/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ person_id: personId, plan_id: planId })
    });
    if(!res.ok){
      setStatus('Failed to start.');
      alert(await res.text());
      return;
    }
    const j = await res.json();
    sessionId = j.session_id;
    $("sessionInfo").textContent = `session_id=${sessionId}  plan=${j.plan_id}  person=${j.person_id}`;

    $("chat").innerHTML = '';
    $("output").value = '';

    if(j.question){
      setActiveQuestion(j.question);
      bubble('assistant', j.question.prompt);
      setStatus('Interview started.');
    } else {
      setActiveQuestion(null);
      bubble('assistant', 'No questions in plan.');
      setStatus('No questions.');
    }
  }

  async function submitAnswer(skipped=false){
    if(!sessionId || !activeQuestion){ alert('Start an interview first'); return; }

    const text = (skipped ? '' : $("answer").value).trim();
    if(!skipped && !text){ return; }

    if(!skipped) bubble('user', text);
    $("answer").value = '';

    setStatus('Saving...');
    const res = await fetch('/api/interview/answer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: sessionId,
        question_id: activeQuestion.id,
        answer: text,
        skipped: !!skipped
      })
    });

    if(!res.ok){
      setStatus('Error.');
      alert(await res.text());
      return;
    }

    const j = await res.json();

    if(j.generated_summary){
      const label = j.summary_section_title ? `📝 Section Summary — ${j.summary_section_title}` : '📝 Section Summary';
      bubble('assistant', `${label}\n\n${j.generated_summary}`);
      appendOutput(label, j.generated_summary);
    }

    if(j.followups_inserted && j.followups_inserted > 0){
      bubble('assistant', `✨ Added ${j.followups_inserted} follow-up questions to continue the interview.`);
    }

    if(j.final_memoir){
      bubble('assistant', `📖 Final Memoir Draft\n\n${j.final_memoir}`);
      appendOutput('📖 Final Memoir Draft', j.final_memoir);
    }

    if(j.done){
      setActiveQuestion(null);
      bubble('assistant', '✅ Interview complete.');
      setStatus('Done.');
      return;
    }

    if(j.next_question){
      setActiveQuestion(j.next_question);
      bubble('assistant', j.next_question.prompt);
      setStatus('Ready.');
    } else {
      setActiveQuestion(null);
      bubble('assistant', 'No next question returned.');
      setStatus('Idle.');
    }
  }

  $("refreshPeopleBtn").addEventListener('click', refreshPeople);
  $("startBtn").addEventListener('click', startInterview);
  $("sendBtn").addEventListener('click', () => submitAnswer(false));
  $("skipBtn").addEventListener('click', () => {
    bubble('user', '⏭️ (skipped)');
    submitAnswer(true);
  });
  $("clearBtn").addEventListener('click', () => {
    $("chat").innerHTML = '';
    setStatus('Cleared.');
  });
  $("copyBtn").addEventListener('click', async () => {
    await navigator.clipboard.writeText($("output").value || '');
    setStatus('Copied output to clipboard.');
    setTimeout(() => setStatus('Ready.'), 900);
  });

  $("answer").addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && (e.ctrlKey || e.metaKey)){
      e.preventDefault();
      submitAnswer(false);
    }
  });

  refreshPeople();
</script>

</body>
</html>
